<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>e-Gov 法令ダウンローダー</title>
  <style>
    :root {
      --bg: #f5efe4;
      --panel: #fffdf8;
      --ink: #1d2a33;
      --accent: #007a78;
      --line: #d8cdbd;
      --warn: #8b2e00;
      --mono: "SFMono-Regular", "Menlo", monospace;
      --sans: "Hiragino Sans", "Yu Gothic", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #fff7df 0, transparent 32%),
        linear-gradient(160deg, #efe4cf 0%, #f5efe4 55%, #e8efe8 100%);
      min-height: 100vh;
    }
    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 24px auto 40px;
    }
    .hero, .panel {
      border: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.94);
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(61, 52, 40, 0.08);
    }
    .hero {
      padding: 24px 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 44px);
    }
    .lead {
      margin: 0;
      line-height: 1.7;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 18px;
      margin-top: 18px;
    }
    .panel {
      padding: 18px;
    }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cdbfaa;
      background: #fff;
      font-size: 15px;
    }
    .file-types, .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid #cdbfaa;
      background: #fff;
      font-size: 14px;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }
    button.secondary {
      background: #e7ece8;
      color: var(--ink);
    }
    button:disabled {
      opacity: 0.55;
      cursor: wait;
    }
    .results {
      display: grid;
      gap: 10px;
      max-height: 440px;
      overflow: auto;
      padding-right: 6px;
    }
    .law-card {
      border: 1px solid #dccfbf;
      border-radius: 14px;
      background: white;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 12px;
    }
    .law-title {
      font-weight: 700;
      margin-bottom: 4px;
    }
    .law-meta {
      color: #5d6a72;
      font-size: 13px;
      line-height: 1.6;
    }
    .status {
      margin-top: 12px;
      min-height: 24px;
      font-weight: 700;
      color: #0b6b63;
    }
    .status.error {
      color: var(--warn);
    }
    .log {
      background: #162329;
      color: #d9f8ed;
      border-radius: 14px;
      padding: 14px;
      min-height: 260px;
      white-space: pre-wrap;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
      overflow: auto;
    }
    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #5d6a72;
      line-height: 1.6;
    }
    @media (max-width: 860px) {
      .grid, .row { grid-template-columns: 1fr; }
      .wrap { width: min(100% - 20px, 1100px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>e-Gov 法令ダウンローダー</h1>
      <p class="lead">法令を検索して、複数の法令を複数形式で保存できます。下のログには、いま何を実行しているかが順番に表示されます。</p>
    </section>

    <div class="grid">
      <section class="panel">
        <h2>1. 検索条件</h2>
        <div class="row">
          <div>
            <label for="keyword">法令名</label>
            <input id="keyword" type="text" placeholder="例: 民法">
          </div>
          <div>
            <label for="limit">候補件数</label>
            <input id="limit" type="number" min="1" value="10">
          </div>
        </div>
        <div style="margin-top:12px;">
          <label for="asof">時点 (任意)</label>
          <input id="asof" type="text" placeholder="YYYY-MM-DD">
        </div>
        <div style="margin-top:12px;">
          <label for="outputDir">保存先フォルダ</label>
          <div class="row" style="grid-template-columns: 1fr 120px;">
            <input id="outputDir" type="text" placeholder="/Users/...">
            <button id="chooseDirButton" class="secondary">選ぶ</button>
          </div>
        </div>
        <div style="margin-top:14px;">
          <label>2. ダウンロード形式</label>
          <div class="file-types" id="fileTypes"></div>
        </div>
        <div class="actions" style="margin-top:14px;">
          <button id="searchButton">法令を検索</button>
          <button id="downloadButton" class="secondary">選択した法令を保存</button>
        </div>
        <div id="status" class="status">待機中</div>
        <p class="hint">保存したい法令は複数選べます。形式も複数選べます。`pdf` は e-Gov API 非対応なので出していません。</p>
      </section>

      <section class="panel">
        <h2>3. 検索結果</h2>
        <div id="results" class="results"></div>
      </section>

      <section class="panel" style="grid-column: 1 / -1;">
        <h2>4. 実行ログ</h2>
        <div id="log" class="log">アプリを起動しました。検索条件を入力してください。</div>
      </section>
    </div>
  </div>

  <script>
    const supportedTypes = ["xml", "json", "html", "rtf", "docx"];
    const state = {
      laws: [],
      selectedIndexes: new Set(),
      pending: new Map(),
      requestId: 0,
    };

    const fileTypesRoot = document.getElementById("fileTypes");
    const resultsRoot = document.getElementById("results");
    const logRoot = document.getElementById("log");
    const statusRoot = document.getElementById("status");
    const searchButton = document.getElementById("searchButton");
    const downloadButton = document.getElementById("downloadButton");
    const chooseDirButton = document.getElementById("chooseDirButton");

    function appendLog(message) {
      logRoot.textContent += "\n" + message;
      logRoot.scrollTop = logRoot.scrollHeight;
    }

    function setStatus(message, isError = false) {
      statusRoot.textContent = message;
      statusRoot.classList.toggle("error", isError);
    }

    function selectedFileTypes() {
      return supportedTypes.filter((name) => {
        const checkbox = document.getElementById(`file-${name}`);
        return checkbox && checkbox.checked;
      });
    }

    function renderFileTypes() {
      fileTypesRoot.innerHTML = "";
      supportedTypes.forEach((name, index) => {
        const wrapper = document.createElement("label");
        wrapper.className = "pill";
        wrapper.innerHTML = `<input type="checkbox" id="file-${name}" ${index === 2 ? "checked" : ""}> ${name.toUpperCase()}`;
        fileTypesRoot.appendChild(wrapper);
      });
    }

    function renderResults() {
      resultsRoot.innerHTML = "";
      if (!state.laws.length) {
        resultsRoot.innerHTML = "<div class='hint'>検索するとここに候補が表示されます。</div>";
        return;
      }

      state.laws.forEach((law) => {
        const card = document.createElement("label");
        card.className = "law-card";
        card.innerHTML = `
          <input type="checkbox" data-index="${law.index}" ${state.selectedIndexes.has(law.index) ? "checked" : ""}>
          <div>
            <div class="law-title">${law.title}</div>
            <div class="law-meta">${law.summary}</div>
          </div>
        `;
        const checkbox = card.querySelector("input");
        checkbox.addEventListener("change", () => {
          if (checkbox.checked) {
            state.selectedIndexes.add(law.index);
          } else {
            state.selectedIndexes.delete(law.index);
          }
        });
        resultsRoot.appendChild(card);
      });
    }

    function bridgeRequest(action, payload = {}) {
      return new Promise((resolve, reject) => {
        const requestId = ++state.requestId;
        state.pending.set(requestId, { resolve, reject });
        window.webkit.messageHandlers.egov.postMessage({ requestId, action, payload });
      });
    }

    window.handleNativeResponse = (message) => {
      const pending = state.pending.get(message.requestId);
      if (!pending) {
        return;
      }
      state.pending.delete(message.requestId);
      if (message.ok) {
        pending.resolve(message.payload || {});
      } else {
        pending.reject(new Error(message.error || "不明なエラー"));
      }
    };

    searchButton.addEventListener("click", async () => {
      const keyword = document.getElementById("keyword").value.trim();
      const limit = Number(document.getElementById("limit").value);
      if (!keyword) {
        setStatus("法令名を入力してください。", true);
        return;
      }
      if (!Number.isInteger(limit) || limit < 1) {
        setStatus("候補件数は 1 以上の整数で入力してください。", true);
        return;
      }

      try {
        searchButton.disabled = true;
        setStatus("検索中です...");
        appendLog("検索開始: API へ法令候補を問い合わせます。");
        const response = await bridgeRequest("search", { keyword, limit });
        state.laws = response.laws || [];
        state.selectedIndexes.clear();
        renderResults();
        appendLog(`検索完了: ${state.laws.length} 件の候補を表示しました。`);
        setStatus(`検索完了: ${state.laws.length} 件`);
      } catch (error) {
        appendLog(`検索失敗: ${error.message}`);
        setStatus(error.message, true);
      } finally {
        searchButton.disabled = false;
      }
    });

    downloadButton.addEventListener("click", async () => {
      const indexes = Array.from(state.selectedIndexes);
      const fileTypes = selectedFileTypes();
      const outputDir = document.getElementById("outputDir").value.trim();
      const asof = document.getElementById("asof").value.trim();

      if (!indexes.length) {
        setStatus("保存したい法令を 1 件以上選択してください。", true);
        return;
      }
      if (!fileTypes.length) {
        setStatus("保存形式を 1 つ以上選択してください。", true);
        return;
      }
      if (!outputDir) {
        setStatus("保存先フォルダを入力してください。", true);
        return;
      }

      try {
        downloadButton.disabled = true;
        setStatus("保存中です...");
        appendLog("保存開始: 選択した法令を順番にダウンロードします。");
        const response = await bridgeRequest("download", { indexes, fileTypes, outputDir, asof });
        (response.logs || []).forEach(appendLog);
        setStatus(`保存完了: ${(response.savedPaths || []).length} ファイル`);
      } catch (error) {
        appendLog(`保存失敗: ${error.message}`);
        setStatus(error.message, true);
      } finally {
        downloadButton.disabled = false;
      }
    });

    chooseDirButton.addEventListener("click", async () => {
      try {
        const response = await bridgeRequest("chooseOutputDirectory", {});
        if (response.outputDir) {
          document.getElementById("outputDir").value = response.outputDir;
          appendLog(`保存先を変更しました: ${response.outputDir}`);
        }
      } catch (error) {
        appendLog(`保存先の選択に失敗: ${error.message}`);
        setStatus(error.message, true);
      }
    });

    renderFileTypes();
    renderResults();
  </script>
</body>
</html>
